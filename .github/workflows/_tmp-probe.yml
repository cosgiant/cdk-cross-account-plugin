name: "TEMP probe"
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - id: t
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ secrets.GH_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.GH_AUTOMATION_APP_PRIVATE_KEY }}
      - run: echo "ORG-LEVEL GH_AUTOMATION_APP_ID resolves to app-slug=${{ steps.t.outputs.app-slug }}"
